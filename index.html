<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador Mágico com IA</title>

    <link rel="stylesheet" href="./src/css/estilo.css">
    <link rel="shortcut icon" href="./src/favicon/favicon.ico" type="image/x-icon">
</head>

<body>
    <h1>✨ Criador Mágico de Animações com IA</h1>

    <!-- Principal / Caixa Invisieis -->
    <main>
        <section class="sessao-maior">
            <h2>💻 Código CSS</h2>
            <div class="area-codigo">// Aqui aparecerá o código da animação...</div>
        </section>

        <section class="sessao-maior">
            <h2>🎨 Resultado</h2>
            <div class="area-resultado">A mágica aparecerá aqui...</div>
        </section>
    </main>

    <section class="sessao-menor">
        <input class="input-animacao" type="text" placeholder="Descreva animação que você quer...Ex: Caixa Rodando">
        <button onclick="cliqueiNoBotao()" class="botao-magica">Criar Mágica ✨</button>
    </section>

    <script src="./src/js/scripts.js"></script>
</body>

</html>

<!-- section = sessão 
 main - principal
 div - caixa genérica 
-->
